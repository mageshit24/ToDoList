<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="description" content="A clean, full-stack task manager built with the MERN stack" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <!-- Vite serves everything in public/ as static files at the site root,
         so paths here are plain "/favicon.ico" rather than CRA's %PUBLIC_URL%
         templating — Vite doesn't need that indirection. -->
    <link rel="manifest" href="/manifest.json" />
    <title>To-Do List</title>
</head>

<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!-- Vite's entry point is referenced directly as a module script (no
         separate bundler config needed for this) — it handles bundling
         src/index.js and everything it imports automatically. -->
    <script type="module" src="/src/index.jsx"></script>
</body>

</html>
